version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: projectmgt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectmgt
      POSTGRES_USER: projectmgt
      POSTGRES_PASSWORD: projectmgt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
