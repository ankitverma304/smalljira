services:
  - type: web
    name: projectmgt-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run deploy:render
    startCommand: npm run start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projectmgt-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://projectmgt-web.onrender.com

  - type: web
    name: projectmgt-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://projectmgt-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: projectmgt-db
    plan: free
